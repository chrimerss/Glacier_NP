<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Glacier NP Day 2 — Interactive Route Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  html, body { margin:0; padding:0; height:100%; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  #wrap { display:flex; flex-direction:column; height:100%; }
  #banner {
    padding:10px 16px; background:#fdf3e8; border-bottom:1px solid #eccfa0;
    color:#7a3a10; font-size:14px; font-weight:600; line-height:1.4;
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px;
  }
  #banner .title { color:#1a1a1a; font-weight:700; font-size:15px; }
  #banner .status { text-align:right; }
  #map { flex:1; min-height:520px; }
  .stop-badge {
    color:#fff; border:2px solid #fff; border-radius:50%;
    width:26px; height:26px; display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:12px; box-shadow:0 1px 3px rgba(0,0,0,.5);
    text-shadow:0 1px 2px rgba(0,0,0,.6);
  }
  .stop-badge.active { width:34px; height:34px; font-size:15px; border:3px solid #1a1a1a; }
  .legend .grad-bar {
    height:9px; border-radius:4px; margin:4px 0 3px 0;
    background: linear-gradient(to right, #440154 0%, #3b528b 25%, #21908d 50%, #5dc963 75%, #fde725 100%);
  }
  .legend .grad-ticks { display:flex; justify-content:space-between; font-size:10px; color:#555; }
  .leaflet-popup-content { font-size:13px; line-height:1.5; }
  .leaflet-popup-content b { display:block; margin-bottom:2px; }
  .legend {
    background:#fff; padding:8px 10px; border-radius:6px; box-shadow:0 1px 4px rgba(0,0,0,.3);
    font-size:12px; line-height:1.7;
  }
  .legend span.swatch { display:inline-block; width:18px; height:0; border-top:3px solid; margin-right:6px; vertical-align:middle; }
  span.dot {
    display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:5px; vertical-align:middle;
  }
  .loc-label {
    background:#fff; border:1px solid #ccc; border-radius:4px; padding:2px 6px;
    font-size:11.5px; font-weight:700; color:#1a1a1a; box-shadow:0 1px 2px rgba(0,0,0,.25);
  }
  .loc-label::before { display:none; }
  .poi-label { color:#6a4fb3; font-weight:600; font-size:10.5px; }
  .infobox {
    background:#fff; padding:9px 11px; border-radius:6px; box-shadow:0 1px 4px rgba(0,0,0,.3);
    font-size:11.5px; line-height:1.5; min-width:225px;
  }
  .infobox .infobox-title { font-weight:700; margin-bottom:5px; font-size:12.5px; color:#1a1a1a; }
  .infobox .infobox-row { display:flex; align-items:center; gap:6px; padding:2px 0; }
  .infobox .infobox-row .ib-dot {
    flex:0 0 auto; width:10px; height:10px; border-radius:50%; border:1px solid rgba(0,0,0,.25);
  }
  .infobox .infobox-row .ib-name { flex:1 1 auto; color:#1a1a1a; }
  .infobox .infobox-row .ib-time { flex:0 0 auto; color:#555; font-weight:600; white-space:nowrap; font-size:11px; }

  .panel-head {
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .panel-toggle {
    flex:0 0 auto; border:1px solid #ccc; background:#f5f5f5; color:#333;
    width:20px; height:20px; border-radius:4px; font-size:13px; line-height:1;
    display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0;
  }
  .panel-toggle:hover { background:#e9e9e9; }
  .panel-body { margin-top:2px; }
  .legend.collapsed .panel-body, .infobox.collapsed .panel-body { display:none; }
  .legend.collapsed, .infobox.collapsed { min-width:0; padding:6px 8px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="banner">
    <div class="title">Glacier NP Day 2 — Whitefish ⇄ Logan Pass</div>
    <div class="status" id="statusText">Loading current time…</div>
  </div>
  <div id="map"></div>
</div>

<script>
// ---- Trip data ----
const TRIP_DATE = { year: 2026, month: 7, day: 12 }; // itinerary date

const stops = [
  { idx:1, name:"Whitefish", sub:"Depart 6:30 AM", lat:48.4106373, lon:-114.3352652,
    desc:"Trip start / end point.", start:390, end:420, track:true },
  { idx:2, name:"West Glacier / Lake McDonald corridor", sub:"~7:00–7:15 AM", lat:48.4949755, lon:-113.9810756,
    desc:"Park entrance area. Try parking near Trail of the Cedars / Avalanche.", start:420, end:435, track:true },
  { idx:3, name:"Trail of the Cedars", sub:"7:45–8:30 AM", lat:48.6807121, lon:-113.8189331,
    desc:"1-mile easy boardwalk loop (30–45 min). Arrive ~7:30 AM.", start:465, end:510, track:true },
  { idx:4, name:"Avalanche Lake Trailhead", sub:"9:00 AM–1:00 PM", lat:48.67646149999999, lon:-113.8137748,
    desc:"~5 mile round trip, easy to moderate (2.5–3.5 hrs). Lunch break here 1:00–2:00 PM, then continue up to Logan Pass.", start:540, end:780, track:true },
  { idx:5, name:"Logan Pass", sub:"2:00–4:00 PM · Road to the Sun", lat:48.6953121, lon:-113.7177546,
    desc:"Continental Divide — Logan Pass Visitor Center, Hidden Lake Overlook trailhead. ~39 min drive each way (16.0 mi) from Avalanche Creek on Going-to-the-Sun Rd. Then it's ~48 min back down to Lake McDonald Lodge, so leave the pass by ~3:42 PM to make the 4:30 PM boat-tour cutoff.", start:840, end:960, track:true },
  { idx:6, name:"Lake McDonald Lodge", sub:"Boat dock, by 4:30 PM", lat:48.6173566, lon:-113.8792077,
    desc:"Back down from Logan Pass to the boat dock. Arrive by 4:30 PM (1 hr before the 5:30 PM scenic tour) to park and get tickets.", start:990, end:1050, track:true },
];

const TRAFFIC = {
  light:    { color:"#2e8b57", text:"Light traffic" },
  moderate: { color:"#d9a441", text:"Moderate traffic" },
  heavy:    { color:"#c0392b", text:"Heavy traffic" },
};

const legs = [
  { from:0, to:1, weight:5, dash:null, time:"~32 min", traffic:"light" },
  { from:1, to:2, weight:5, dash:null, time:"~28 min", traffic:"heavy" },
  { from:5, to:0, weight:4, dash:null, time:"~51 min", traffic:"light" },
  {
    // Going-to-the-Sun Road, Avalanche Creek -> Logan Pass, threaded through the named pullouts
    weight:5, dash:null, time:"~39 min each way (16.0 mi)", traffic:"heavy",
    points: [
      [48.67646149999999, -113.8137748],   // Avalanche Lake Trailhead
      [48.6975, -113.7375],         // The Loop
      [48.6950, -113.7300],         // Bird Woman Falls Overlook
      [48.6975, -113.7260],         // Weeping Wall
      [48.6978, -113.7220],         // Big Bend
      [48.6965, -113.7195],         // Oberlin Bend Overlook
      [48.6953121, -113.7177546],   // Logan Pass
    ],
  },
  {
    // Return leg: Avalanche junction south to Lake McDonald Lodge, via Sacred Dancing Cascade
    weight:5, dash:null, time:"~9 min (5.7 mi)", traffic:"moderate",
    points: [
      [48.67646149999999, -113.8137748],   // Avalanche Lake Trailhead
      [48.6421937, -113.8523404],   // Sacred Dancing Cascade
      [48.6173566, -113.8792077],   // Lake McDonald Lodge
    ],
  },
];

// Scenic pullouts / viewpoints along Going-to-the-Sun Road (not numbered stops)
const poi = [
  { name:"Sacred Dancing Cascade", lat:48.6421937, lon:-113.8523404,
    desc:"Short pullout over a cascade on McDonald Creek." },
  { name:"The Loop", lat:48.6975, lon:-113.7375,
    desc:"Historic hairpin switchback; Granite Park Trailhead." },
  { name:"Bird Woman Falls Overlook", lat:48.6950, lon:-113.7300,
    desc:"Roadside view of Bird Woman Falls on Mt. Oberlin." },
  { name:"Weeping Wall", lat:48.6975, lon:-113.7260,
    desc:"Water runs directly over the road — best in spring/early summer." },
  { name:"Big Bend", lat:48.6978, lon:-113.7220,
    desc:"Wide overlook of the valley below." },
  { name:"Oberlin Bend Overlook", lat:48.6965, lon:-113.7195,
    desc:"Close-up view of the Garden Wall, just before Logan Pass." },
];

// Hiking trails — dashed, colored by difficulty rather than traffic
const TRAIL = {
  easy:     { color:"#3f8f4f", text:"Easy" },
  moderate: { color:"#a5642a", text:"Moderate" },
};

const trails = [
  {
    name: "Trail of the Cedars",
    difficulty: "easy",
    info: "1 mi loop · easy · ~30 min",
    points: [
      [48.6807121, -113.8189331],
      [48.6822, -113.8167],
      [48.6800, -113.8148],
      [48.6786, -113.8172],
      [48.6807121, -113.8189331],
    ],
  },
  {
    name: "Avalanche Lake Trail",
    difficulty: "moderate",
    info: "4.6 mi round trip · moderate · ~2–3 hr",
    points: [
      [48.67646149999999, -113.8137748],
      [48.6720, -113.8060],
      [48.6640, -113.7980],
      [48.6595, -113.7915],
      [48.6553472, -113.7870306],
    ],
  },
];

// ---- Map setup ----
const map = L.map('map').setView([48.55, -113.95], 10);
L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
  maxZoom: 20,
  subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
  attribution: '&copy; Google'
}).addTo(map);

// Viridis-style sequential colormap: earliest arrival -> darkest purple, latest -> yellow
const CMAP = [
  [0.00, [68, 1, 84]],
  [0.25, [59, 82, 139]],
  [0.50, [33, 144, 141]],
  [0.75, [93, 201, 99]],
  [1.00, [253, 231, 37]],
];
function cmap(t) {
  t = Math.max(0, Math.min(1, t));
  for (let i = 0; i < CMAP.length - 1; i++) {
    const [t0, c0] = CMAP[i], [t1, c1] = CMAP[i + 1];
    if (t >= t0 && t <= t1) {
      const f = (t - t0) / (t1 - t0);
      const c = c0.map((v, j) => Math.round(v + (c1[j] - v) * f));
      return `rgb(${c[0]},${c[1]},${c[2]})`;
    }
  }
  const c = CMAP[CMAP.length - 1][1];
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

const arrivalMin = Math.min(...stops.map(s => s.start));
const arrivalMax = Math.max(...stops.map(s => s.start));
stops.forEach(s => {
  s.color = cmap((s.start - arrivalMin) / (arrivalMax - arrivalMin));
});

// Clicking any location marker zooms/pans in for a closer look
const FOCUS_ZOOM = 15;
function focusOn(latlng) {
  map.flyTo(latlng, Math.max(map.getZoom(), FOCUS_ZOOM), { duration: 0.8 });
}

function makeIcon(idx, color, active) {
  return L.divIcon({
    className: '',
    html: `<div class="stop-badge${active ? ' active' : ''}" style="background:${color}">${idx}</div>`,
    iconSize: active ? [34,34] : [26,26],
    iconAnchor: active ? [17,17] : [13,13],
  });
}

const markers = stops.map(s => {
  const m = L.marker([s.lat, s.lon], { icon: makeIcon(s.idx, s.color, false) }).addTo(map);
  m.bindPopup(`<b>${s.idx}. ${s.name}</b>${s.sub}<br/>${s.desc}`);
  m.bindTooltip(`${s.idx}. ${s.name}`, {
    permanent: true, direction: 'right', offset: [12, 0], className: 'loc-label'
  });
  m.on('click', () => focusOn(m.getLatLng()));
  return m;
});

legs.forEach(leg => {
  const pts = leg.points || [
    [stops[leg.from].lat, stops[leg.from].lon],
    [stops[leg.to].lat, stops[leg.to].lon],
  ];
  const t = TRAFFIC[leg.traffic];
  const line = L.polyline(pts, {
    color: t.color, weight: leg.weight, dashArray: leg.dash, opacity: 0.9, lineJoin: 'round'
  }).addTo(map);
  line.bindPopup(`<b>${leg.time}</b><br/><span style="color:${t.color}">${t.text}</span>`);
  line.on('mouseover', () => line.setStyle({ weight: leg.weight + 3 }));
  line.on('mouseout', () => line.setStyle({ weight: leg.weight }));
});

// Scenic pullout markers along Going-to-the-Sun Road
const POI_COLOR = "#6a4fb3";
poi.forEach(p => {
  const cm = L.circleMarker([p.lat, p.lon], {
    radius: 4.5, color: POI_COLOR, fillColor: POI_COLOR, fillOpacity: 1, weight: 2
  }).addTo(map)
    .bindTooltip(p.name, { permanent: true, direction: 'top', offset: [0, -5], className: 'loc-label poi-label' })
    .bindPopup(`<b>${p.name}</b><br/>${p.desc}`);
  cm.on('click', () => focusOn(cm.getLatLng()));
});

trails.forEach(trail => {
  const d = TRAIL[trail.difficulty];
  const line = L.polyline(trail.points, {
    color: d.color, weight: 3.5, dashArray: "6 5", opacity: 0.9, lineJoin: 'round'
  }).addTo(map);
  line.bindPopup(`<b>${trail.name}</b><br/>${trail.info}<br/><span style="color:${d.color}">${d.text}</span>`);
  line.on('mouseover', () => line.setStyle({ weight: 6 }));
  line.on('mouseout', () => line.setStyle({ weight: 3.5 }));
});

// Endpoint marker for Avalanche Lake (trail's end, not a drive-to stop)
const avaLakeMarker = L.circleMarker([48.6553472, -113.7870306], {
  radius: 5, color: "#a5642a", fillColor: "#a5642a", fillOpacity: 1, weight: 2
}).addTo(map).bindTooltip("Avalanche Lake", {
  permanent: true, direction: 'top', offset: [0, -6], className: 'loc-label'
}).bindPopup("<b>Avalanche Lake</b><br/>End of the 2.3-mile trail from the trailhead.");
avaLakeMarker.on('click', () => focusOn(avaLakeMarker.getLatLng()));

const bounds = L.latLngBounds(stops.map(s => [s.lat, s.lon]));
bounds.extend([48.6553472, -113.7870306]);
poi.forEach(p => bounds.extend([p.lat, p.lon]));
map.fitBounds(bounds, { padding: [40,40] });

// Wraps a panel's inner HTML with a header (title + show/hide button) so it can
// be collapsed on request — handy on a phone screen where these panels get cramped.
// A JS-driven button, not a CSS breakpoint, so it works the same on every device
// and the user stays in control either way.
function makeCollapsible(div, title, bodyHtml, startCollapsed) {
  const btn = document.createElement('button');
  btn.className = 'panel-toggle';
  btn.type = 'button';
  btn.setAttribute('aria-label', 'Toggle panel');
  btn.textContent = startCollapsed ? '+' : '−';

  const head = document.createElement('div');
  head.className = 'panel-head';
  head.innerHTML = `<span style="font-weight:700;">${title}</span>`;
  head.appendChild(btn);

  const body = document.createElement('div');
  body.className = 'panel-body';
  body.innerHTML = bodyHtml;

  div.appendChild(head);
  div.appendChild(body);
  if (startCollapsed) div.classList.add('collapsed');

  btn.addEventListener('click', () => {
    const collapsed = div.classList.toggle('collapsed');
    btn.textContent = collapsed ? '+' : '−';
  });

  L.DomEvent.disableClickPropagation(div);
  L.DomEvent.disableScrollPropagation(div);
}

const NARROW_SCREEN = window.innerWidth < 700;

// Legend
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function () {
  const div = L.DomUtil.create('div', 'legend');
  const tickTimes = [arrivalMin, (arrivalMin + arrivalMax) / 2, arrivalMax]
    .map(min => { const [h, m] = toHM(min); return fmtTime(h, m); });
  const bodyHtml = `
    <div class="grad-bar"></div>
    <div class="grad-ticks"><span>${tickTimes[0]}</span><span>${tickTimes[1]}</span><span>${tickTimes[2]}</span></div>
    <div style="margin-top:6px; padding-top:5px; border-top:1px solid #eee; font-weight:700;">Driving — color = traffic</div>
    <div><span class="dot" style="background:#2e8b57"></span>Light</div>
    <div><span class="dot" style="background:#d9a441"></span>Moderate</div>
    <div><span class="dot" style="background:#c0392b"></span>Heavy</div>
    <div style="margin-top:6px; padding-top:5px; border-top:1px solid #eee; font-weight:700;">Trails — dashed, color = difficulty</div>
    <div><span class="dot" style="background:#3f8f4f"></span>Easy</div>
    <div><span class="dot" style="background:#a5642a"></span>Moderate</div>
    <div style="margin-top:6px; padding-top:5px; border-top:1px solid #eee;">
      <span class="dot" style="background:#6a4fb3"></span>Scenic pullout / viewpoint
    </div>
    <div style="margin-top:5px; padding-top:4px; border-top:1px solid #eee; color:#777;">Click any line or dot for details</div>
  `;
  makeCollapsible(div, 'Legend', bodyHtml, NARROW_SCREEN);
  return div;
};
legend.addTo(map);

// Top-left info box: landmark + time to spend there
const infobox = L.control({ position: 'topleft' });
infobox.onAdd = function () {
  const div = L.DomUtil.create('div', 'infobox');
  const rows = stops.map(s => {
    return `<div class="infobox-row">
      <span class="ib-dot" style="background:${s.color}"></span>
      <span class="ib-name">${s.idx}. ${s.name}</span>
      <span class="ib-time">${timeRangeLabel(s)}</span>
    </div>`;
  }).join('');
  makeCollapsible(div, 'Start – end time at each stop', rows, NARROW_SCREEN);
  return div;
};
infobox.addTo(map);

// ---- Live status (Mountain Time) ----
function mountainNow() {
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/Denver', hour12: false,
    year:'numeric', month:'numeric', day:'numeric',
    hour:'2-digit', minute:'2-digit', second:'2-digit'
  }).formatToParts(new Date());
  const get = t => parseInt(parts.find(p => p.type === t).value, 10);
  return {
    year: get('year'), month: get('month'), day: get('day'),
    hour: get('hour') === 24 ? 0 : get('hour'), minute: get('minute'), second: get('second')
  };
}

function fmtDuration(mins) {
  const h = Math.floor(mins / 60), m = mins % 60;
  if (h === 0) return `${m} min`;
  if (m === 0) return `${h} hr`;
  return `${h} hr ${m} min`;
}

function toHM(min) {
  return [Math.floor(min / 60) % 24, min % 60];
}

function fmtTime(h, m) {
  const ampm = h >= 12 ? 'PM' : 'AM';
  let h12 = h % 12; if (h12 === 0) h12 = 12;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}

function timeRangeLabel(s) {
  const [h1, m1] = toHM(s.start);
  if (s.idx === 1) return fmtTime(h1, m1);
  const [h2, m2] = toHM(s.end);
  return `${fmtTime(h1, m1)}–${fmtTime(h2, m2)}`;
}

function updateStatus() {
  const now = mountainNow();
  const minuteOfDay = now.hour * 60 + now.minute;
  const isTripDay = now.year === TRIP_DATE.year && now.month === TRIP_DATE.month && now.day === TRIP_DATE.day;
  const timeStr = `${fmtTime(now.hour, now.minute)} MDT`;

  let activeIdx = null;
  let msg = '';

  if (!isTripDay) {
    msg = `Viewing itinerary for Sun Jul 12, 2026 — not live-tracking today.`;
  } else if (minuteOfDay < 390) {
    msg = `Trip starts at 6:30 AM — ${timeStr} now.`;
    activeIdx = 1;
  } else if (minuteOfDay < 990) {
    // find which stop window we're in
    const s = stops.find(s => s.track && minuteOfDay >= s.start && minuteOfDay < s.end);
    if (s) {
      activeIdx = s.idx;
      msg = `${timeStr} — at ${s.name}.`;
      if (s.idx === 5) {
        const leaveBy = 942; // 3:42 PM — latest safe departure from Logan Pass (48-min drive back)
        if (minuteOfDay < leaveBy) {
          msg += ` Leave by 3:42 PM to make the 4:30 PM boat cutoff (${leaveBy - minuteOfDay} min).`;
        } else {
          msg += ` Past the safe turnaround time — the 4:30 PM boat cutoff is now at risk (48-min drive back).`;
        }
      }
    } else if (minuteOfDay >= 960 && minuteOfDay < 990) {
      msg = `${timeStr} — driving back down from Logan Pass (~48 min) — cutting it close for the 4:30 PM cutoff.`;
    } else {
      msg = `${timeStr} — en route.`;
    }
  } else if (minuteOfDay < 1050) {
    activeIdx = 6;
    msg = `${timeStr} — at the dock, ${1050 - minuteOfDay} min until 5:30 PM boat departure.`;
  } else if (minuteOfDay < 1140) {
    activeIdx = 6;
    msg = `${timeStr} — on the scenic boat tour.`;
  } else if (minuteOfDay < 1290) {
    msg = `${timeStr} — driving back to Whitefish (~51 min).`;
  } else {
    activeIdx = 1;
    msg = `${timeStr} — trip complete, back in Whitefish.`;
  }

  document.getElementById('statusText').textContent = msg;

  markers.forEach((m, i) => {
    const s = stops[i];
    m.setIcon(makeIcon(s.idx, s.color, s.idx === activeIdx));
  });
}

updateStatus();
setInterval(updateStatus, 30000);
</script>
</body>
</html>
